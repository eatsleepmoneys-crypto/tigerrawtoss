<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐯 TigerLotto</title>
  <script>
    // Detect device and redirect
    (function() {
      var ua = navigator.userAgent;
      var isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua)
        || (window.innerWidth <= 768);
      var path = window.location.pathname;
      // Don't redirect if already on correct version or admin
      if (path.includes('/desktop/') || path.includes('/mobile/') || path.includes('/admin')) return;
      if (isMobile) {
        window.location.replace('/mobile/');
      } else {
        window.location.replace('/desktop/');
      }
    })();
  </script>
  <style>
    body { background: #0a0a0a; display: flex; align-items: center; justify-content: center;
           height: 100vh; margin: 0; font-family: sans-serif; }
    .spinner { width: 40px; height: 40px; border: 3px solid #1a1a1a;
               border-top-color: #FFD700; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body><div class="spinner"></div></body>
</html>
